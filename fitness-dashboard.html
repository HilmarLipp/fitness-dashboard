  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect } = React;
    const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, BarChart, Bar } = Recharts || {};

    // ─── CONSTANTS ───
    const BEER_KCAL = 1500;
    const BREAKFAST_SHAKE = { kcal: 360, p: 51, k: 33, f: 6 };
    const BREAKFAST_TORTILLA = { kcal: 576, p: 42, k: 44, f: 27 };
    const SNACK_LIGHT = { name: "Edamame (120g, gekocht)", kcal: 170, p: 17, k: 12, f: 6 };
    const MORNING_SUPPLEMENTS = "NR 300mg, DHEA 25mg, B12+Folat";
    const DINNER_SUPPLEMENTS = "Omega 3/D3/K2 (2 Kaps.), Zink 25mg";
    const BEDTIME_SUPPLEMENT = "Magnesium Bisglycinat (3 Kaps.)";

    const PHASE_COLORS = {
      "Aufbau": { bg: "bg-blue-600", text: "text-white", hex: "#3B82F6" },
      "Peak": { bg: "bg-amber-600", text: "text-white", hex: "#F59E0B" },
      "Feinschliff": { bg: "bg-red-600", text: "text-white", hex: "#EF4444" }
    };

    const WEEK_PHASES = [
      { wk: 1, ph: "Aufbau" }, { wk: 2, ph: "Aufbau" }, { wk: 3, ph: "Aufbau" },
      { wk: 4, ph: "Peak" }, { wk: 5, ph: "Peak" }, { wk: 6, ph: "Peak" },
      { wk: 7, ph: "Feinschliff" }, { wk: 8, ph: "Feinschliff" }
    ];
    const WEEK_START_INDEX = WEEK_PHASES.map(wp => RAW.findIndex(d => d.wk === wp.wk));

    const TRAINING_ICONS = {
      "Training": "\u{1F3CB}\uFE0F", "Kraft (Oberkörper)": "\u{1F3CB}\uFE0F",
      "Kraft (Unterkörper)": "\u{1F9B5}", "Kraft (Ganzkörper)": "\u{1F4AA}",
      "HIIT": "\u{1F525}", "Tempo-Lauf": "\u{1F3C3}",
      "Aktive Erholung": "\u2600\uFE0F", "Ruhetag": "\u{1F634}", "Recovery": "\u{1F389}"
    };

    // ─── HELPERS ───
    function formatDate(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      const date = new Date(y, m - 1, d);
      return ["So","Mo","Di","Mi","Do","Fr","Sa"][date.getDay()] + " " + d + "." + String(m).padStart(2,"0");
    }

    function findTodayIndex() {
      const n = new Date();
      const t = n.getFullYear() + "-" + String(n.getMonth()+1).padStart(2,"0") + "-" + String(n.getDate()).padStart(2,"0");
      const i = RAW.findIndex(d => d.dt === t);
      return i >= 0 ? i : 0;
    }

    // ─── RUNTIME TOTALS ───
    function calcDayTotals(dayIndex, skippedMeals, customMeals, breakfastTypes, dinnerChoices) {
      const d = RAW[dayIndex];
      if (!d) return { kcal: 0, p: 0, k: 0, f: 0 };
      const isTortilla = breakfastTypes[dayIndex] === 'tortilla';
      let t = { kcal: 0, p: 0, k: 0, f: 0 };
      const add = (m) => { t.kcal += m.kcal; t.p += m.p; t.k += m.k; t.f += m.f; };

      // Breakfast
      if (d.sh && !skippedMeals[dayIndex + "_sh"]) {
        add(isTortilla ? BREAKFAST_TORTILLA : d.sh);
      }
      // Snack
      if (!skippedMeals[dayIndex + "_sn"]) {
        if (isTortilla) { add(SNACK_LIGHT); }
        else if (d.sn) { add(d.sn); }
      }
      // Dinner (use selected option)
      const diOpts = [d.di, d.di2, d.di3].filter(Boolean);
      const diChoice = diOpts[(dinnerChoices || {})[dayIndex] || 0] || d.di;
      if (diChoice && !skippedMeals[dayIndex + "_di"]) { add(diChoice); }
      // Custom meals
      Object.entries(customMeals).forEach(([k, v]) => {
        if (k.startsWith(dayIndex + "_")) add(v);
      });
      // Beer (display only)
      if (d.beer) t.kcal += BEER_KCAL;

      return { kcal: Math.round(t.kcal), p: Math.round(t.p), k: Math.round(t.k), f: Math.round(t.f) };
    }

    // ─── PERSISTED STATE ───
    function usePersistedState(key, defaultValue) {
      const [state, setState] = useState(() => {
        try { const s = localStorage.getItem('fitness_' + key); return s ? JSON.parse(s) : defaultValue; }
        catch { return defaultValue; }
      });
      useEffect(() => { localStorage.setItem('fitness_' + key, JSON.stringify(state)); }, [state, key]);
      return [state, setState];
    }

    // ─── SUB-COMPONENTS ───
    function MealCard({ time, label, name, ingredients, macros, color, border, expanded, onToggle, skipped, onSkip, supplement }) {
      return (
        <div className={`${color} rounded-xl p-4 border ${border} cursor-pointer transition-all relative ${skipped ? "opacity-40" : ""}`} onClick={onToggle}>
          {skipped && <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10"><span className="text-gray-400 text-xs font-medium bg-gray-900/80 px-3 py-1 rounded-full">Übersprungen</span></div>}
          <div className="flex items-start justify-between">
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-1">
                <span style={{fontSize:12}}>🕐</span>
                <span className="text-gray-400 text-xs">{time}</span>
                <span className="text-gray-500 text-xs">·</span>
                <span className="text-gray-300 text-xs font-medium">{label}</span>
              </div>
              <p className="text-white text-sm font-medium leading-snug">{name}</p>
            </div>
            <div className="flex items-center gap-2 ml-3">
              <span className="text-gray-300 text-sm font-mono whitespace-nowrap">{macros.kcal}</span>
              {onSkip && <button onClick={(e) => { e.stopPropagation(); onSkip(); }}
                className={`w-6 h-6 rounded-full flex items-center justify-center text-xs transition-all ${skipped ? "bg-green-700 hover:bg-green-600 text-white" : "bg-gray-700 hover:bg-red-700 text-gray-400 hover:text-white"}`}
                title={skipped ? "Wieder hinzufügen" : "Überspringen"}>
                {skipped ? "+" : "×"}
              </button>}
            </div>
          </div>
          {expanded && ingredients && !skipped && <div className="mt-3 pt-3 border-t border-gray-700/50"><p className="text-gray-400 text-xs leading-relaxed">{ingredients}</p></div>}
          {!skipped && (
            <div className="flex items-center gap-4 mt-2">
              <span className="text-blue-400 text-xs">P: {macros.p}g</span>
              <span className="text-yellow-400 text-xs">K: {macros.k}g</span>
              <span className="text-orange-400 text-xs">F: {macros.f}g</span>
              {supplement && <span className="text-cyan-400 text-xs ml-auto">{supplement}</span>}
            </div>
          )}
        </div>
      );
    }

    function MacroCircle({ label, value, target, color }) {
      const r = 28, circ = 2 * Math.PI * r;
      const pct = Math.min(100, (value / target) * 100);
      const isOver = value > target;
      const overPct = isOver ? Math.min(100, ((value - target) / target) * 100) : 0;
      return (
        <div className="text-center">
          <div className="relative inline-flex items-center justify-center">
            <svg width="68" height="68" style={{transform:"rotate(-90deg)"}}>
              <circle cx="34" cy="34" r={r} fill="none" stroke="#374151" strokeWidth="5" />
              <circle cx="34" cy="34" r={r} fill="none" stroke={color} strokeWidth="5"
                strokeDasharray={circ} strokeDashoffset={circ*(1-pct/100)} strokeLinecap="round"
                style={{transition:"stroke-dashoffset 0.5s ease"}} />
              {isOver && <circle cx="34" cy="34" r={r} fill="none" stroke="#EF4444" strokeWidth="5"
                strokeDasharray={circ} strokeDashoffset={circ*(1-overPct/100)} strokeLinecap="round"
                style={{transition:"stroke-dashoffset 0.5s ease"}} />}
            </svg>
            <span className={`absolute text-xs font-bold ${isOver ? "text-red-400" : "text-white"}`}>{value}</span>
          </div>
          <p className="text-gray-400 text-xs mt-1">{label}</p>
          <p className="text-gray-500" style={{fontSize:"10px"}}>/ {target}</p>
        </div>
      );
    }

    function PhaseProgressRing({ dayIndex, phase }) {
      const dayNum = dayIndex + 1, total = 56;
      const r = 32, circ = 2 * Math.PI * r;
      const offset = circ * (1 - dayNum / total);
      const hex = (PHASE_COLORS[phase] || {}).hex || "#9CA3AF";
      return (
        <div className="flex items-center gap-3">
          <div className="relative inline-flex items-center justify-center">
            <svg width="76" height="76" style={{transform:"rotate(-90deg)"}}>
              <circle cx="38" cy="38" r={r} fill="none" stroke="#374151" strokeWidth="5" />
              <circle cx="38" cy="38" r={r} fill="none" stroke={hex} strokeWidth="5"
                strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
                style={{transition:"stroke-dashoffset 0.5s ease"}} />
            </svg>
            <span className="absolute text-xs font-bold text-white">{dayNum}</span>
          </div>
          <div>
            <p className="text-gray-400 text-xs">Tag {dayNum} / {total}</p>
            <p className="text-sm font-semibold" style={{color: hex}}>{phase}</p>
          </div>
        </div>
      );
    }

    function Modal({ title, onClose, children }) {
      return (
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50" onClick={onClose}>
          <div className="bg-gray-800 rounded-xl p-6 w-full max-w-sm border border-gray-700" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-bold text-white">{title}</h2>
              <button onClick={onClose} className="text-gray-400 hover:text-white text-xl">×</button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ─── ERROR BOUNDARY ───
    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error: error.message }; }
      render() {
        if (this.state.error) return (
          <div style={{padding:40,color:'#ef4444',background:'#1f2937',fontFamily:'monospace'}}>
            <h2 style={{color:'#f87171'}}>Dashboard Error</h2>
            <pre style={{whiteSpace:'pre-wrap',color:'#fca5a5'}}>{this.state.error}</pre>
          </div>
        );
        return this.props.children;
      }
    }

    try {
      ReactDOM.createRoot(document.getElementById('root')).render(
        <ErrorBoundary><FitnessDashboard /></ErrorBoundary>
      );
    } catch(e) {
      document.getElementById('root').innerHTML = '<div style="padding:40px;color:#ef4444;font-family:monospace"><h2>Startup Error</h2><pre>'+e.message+'</pre></div>';
    }
  </script>
</body>
</html>
